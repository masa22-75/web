<H2 align="center"><IMG src="b_ico010.gif" width="22" height="32" border="0">～PCにはまった理由～<IMG src="b_ico010.gif" width="22" height="32" border="0"></H2>
<CENTER><FONT color="#ffffff">あるとき動かないPC（1台目）をもらったんですよね。そのときはほぼPCの知識はなかったです。<BR>
そのまま2年ぐらいかな、放置してたんですよ。でその後引越しついでに持ってくことになって、（そのときはもうPCの知識は少しあった）<BR>
PCショップに動くかどうか確かめてもらったら動いたんですよね。でその後いつの間にかはまって、、っていう感じです。<BR>
多少うろ覚えですが、これが私とPCの出会いです。<BR>
ちなみに私は4歳ぐらいのころからPCとふれ合っています。おかげで今は立派なPC大好き野郎です（）</FONT></CENTER>
